<!doctype html>
<html lang="en-GB">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>London, A Visitor's Field Guide</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Libre+Caslon+Display&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

<link href="https://api.mapbox.com/mapbox-gl-js/v3.9.3/mapbox-gl.css" rel="stylesheet" />
<script src="https://api.mapbox.com/mapbox-gl-js/v3.9.3/mapbox-gl.js"></script>

<!-- React 18.3 is the latest line that ships browser UMD builds, which a single self-contained file needs. -->
<script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>

  :root {
    --stone: #ECE6DA;
    --stone-card: #F6F2E9;
    --stone-deep: #E1D9C8;
    --ink: #211D17;
    --ink-soft: #534D43;
    --ink-faint: #8A8273;
    --line: #D5CCBA;
    --line-soft: #E3DBCB;
    --claret: #7C2A33;
    --claret-deep: #5E1E26;
    --brass: #8C6E2B;
    --thames: #2C5862;
    --focus: #1f5fbf;
    --radius: 14px;
    --shadow: 0 1px 2px rgba(33,29,23,.05), 0 10px 28px rgba(33,29,23,.06);
    --maxw: 1320px;
    --controls-h: 160px; /* overridden dynamically by ResizeObserver */
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; }
  body {
    background: var(--stone);
    color: var(--ink);
    font-family: "Inter", system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    font-size: 15px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  .visually-hidden {
    position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
    overflow: hidden; clip: rect(0 0 0 0); white-space: nowrap; border: 0;
  }

  a { color: var(--claret); }
  :focus-visible { outline: 2px solid var(--focus); outline-offset: 2px; border-radius: 6px; }
  .wrap { max-width: var(--maxw); margin: 0 auto; padding: 0 22px; }

  /* Masthead */
  .masthead { padding: 40px 0 22px; text-align: center; }
  .kicker { font-size: 11px; letter-spacing: .32em; text-transform: uppercase; color: var(--ink-faint); margin: 0 0 14px; }
  .nameplate {
    font-family: "Libre Caslon Display", Georgia, serif;
    font-size: clamp(54px, 12vw, 130px);
    line-height: .9; margin: 0; letter-spacing: .01em; color: var(--ink);
  }
  .double-rule { border-top: 1px solid var(--ink); border-bottom: 1px solid var(--ink);
    height: 4px; max-width: 560px; margin: 18px auto 0; }
  .sub { margin: 16px auto 0; max-width: 640px; color: var(--ink-soft); font-size: 15px; }
  .dateline { margin-top: 10px; font-size: 11px; letter-spacing: .22em; text-transform: uppercase; color: var(--brass); font-weight: 600; }

  /* Controls */
  .controls {
    position: sticky; top: 0; z-index: 30;
    background: color-mix(in srgb, var(--stone) 90%, transparent);
    backdrop-filter: saturate(140%) blur(8px);
    border-top: 1px solid var(--line);
    border-bottom: 1px solid var(--line);
  }
  .controls-inner { padding: 12px 0 10px; }
  .search-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .search {
    flex: 1 1 220px; display: flex; align-items: center; gap: 10px;
    background: var(--stone-card); border: 1px solid var(--line);
    border-radius: 999px; padding: 9px 16px; min-width: 0;
  }
  .search input { border: 0; background: transparent; outline: none; width: 100%; font: inherit; color: var(--ink); }
  .search svg { flex: 0 0 auto; color: var(--ink-faint); }
  .count { font-size: 12px; color: var(--ink-soft); white-space: nowrap; }
  .linkbtn {
    background: none; border: 0; color: var(--claret); font: inherit;
    cursor: pointer; text-decoration: underline; text-underline-offset: 3px; padding: 0; white-space: nowrap;
  }
  .search-tools { display: flex; gap: 6px; align-items: center; flex-wrap: nowrap; margin-left: auto; }

  /* Update-all progress */
  .update-progress {
    display: flex; align-items: center; gap: 7px; font-size: 12.5px;
    color: var(--ink-soft); white-space: nowrap;
  }
  .update-count { font-weight: 600; color: var(--ink); }

  .chiprow {
    display: flex; gap: 8px; overflow-x: auto; padding: 10px 0 2px;
    scrollbar-width: thin; -webkit-overflow-scrolling: touch;
  }
  .chiprow.wrapped { flex-wrap: wrap; overflow: visible; }
  .chip {
    flex: 0 0 auto; cursor: pointer; font: inherit; font-size: 12.5px;
    border: 1px solid var(--line); background: var(--stone-card);
    color: var(--ink-soft); border-radius: 999px; padding: 6px 13px;
    display: inline-flex; align-items: center; gap: 7px; white-space: nowrap;
    transition: background .15s, color .15s, border-color .15s;
  }
  .chip:hover { border-color: var(--ink-faint); }
  .chip .dot { width: 9px; height: 9px; border-radius: 50%; flex: 0 0 auto; }
  .chip.active { background: var(--ink); color: var(--stone-card); border-color: var(--ink); }
  .chip.feat.active { background: var(--claret); border-color: var(--claret); color: #fff; }
  .filters-label { font-size: 11px; letter-spacing: .2em; text-transform: uppercase; color: var(--ink-faint); margin: 12px 0 2px; }

  /* Layout — map top and height track --controls-h set by ResizeObserver */
  .layout { display: grid; grid-template-columns: 1fr; gap: 26px; padding: 26px 0 70px; }
  @media (min-width: 1000px) {
    .layout { grid-template-columns: minmax(0, 1.32fr) minmax(0, 1fr); align-items: start; }
    .col-map {
      position: sticky;
      top: calc(var(--controls-h) + 14px);
      height: calc(100vh - var(--controls-h) - 40px);
    }
  }

  /* Map */
  .mapcard {
    border: 1px solid var(--line); border-radius: var(--radius); overflow: hidden;
    background: var(--stone-card); box-shadow: var(--shadow); height: 100%;
    display: flex; flex-direction: column; min-height: 380px;
  }
  .map { flex: 1 1 auto; min-height: 280px; }
  .map-foot {
    border-top: 1px solid var(--line-soft); padding: 8px 12px;
    display: flex; gap: 8px 14px; flex-wrap: wrap; align-items: center;
    background: var(--stone-card); flex-shrink: 0;
  }
  .legend-item { display: inline-flex; align-items: center; gap: 6px; font-size: 11px; color: var(--ink-soft); }
  .legend-item .dot { width: 9px; height: 9px; border-radius: 50%; }

  /* Location button in map footer */
  .loc-btn {
    margin-left: auto; flex: 0 0 auto; cursor: pointer; font: inherit; font-size: 12px;
    border: 1px solid var(--line); background: var(--stone-card); border-radius: 999px;
    padding: 5px 11px; display: inline-flex; align-items: center; gap: 6px;
    color: var(--ink-soft); transition: border-color .15s, color .15s, background .15s;
  }
  .loc-btn:hover { border-color: var(--ink-faint); color: var(--ink); }
  .loc-btn.loc-active { background: #E3F0FF; border-color: #2196F3; color: #1565C0; }
  .loc-err { font-size: 11px; color: var(--claret); margin-left: auto; max-width: 200px; }

  /* Location marker */
  .loc-marker { width: 40px; height: 40px; position: relative; pointer-events: none; }
  .loc-core {
    width: 16px; height: 16px; background: #2196F3; border-radius: 50%;
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    border: 3px solid white; box-shadow: 0 2px 12px rgba(33,150,243,.55); z-index: 2;
  }
  .loc-pulse {
    width: 44px; height: 44px;
    background: rgba(33,150,243,.18); border: 1.5px solid rgba(33,150,243,.35);
    border-radius: 50%; position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    animation: locpulse 2.2s ease-out infinite;
  }
  @keyframes locpulse {
    0% { transform: translate(-50%,-50%) scale(.35); opacity: 1; }
    100% { transform: translate(-50%,-50%) scale(1.5); opacity: 0; }
  }

  .map-empty {
    flex: 1 1 auto; display: flex; flex-direction: column; align-items: center;
    justify-content: center; text-align: center; padding: 30px 26px; gap: 14px;
  }
  .map-empty h3 { font-family: "Libre Caslon Display", serif; font-size: 24px; margin: 0; }
  .map-empty p { margin: 0; color: var(--ink-soft); max-width: 380px; font-size: 14px; }
  .token-field { display: flex; gap: 8px; width: 100%; max-width: 420px; }
  .token-field input {
    flex: 1; border: 1px solid var(--line); border-radius: 10px; padding: 10px 12px;
    font: inherit; background: var(--stone); color: var(--ink); min-width: 0;
  }

  /* Sections + cards */
  .col-list { display: flex; flex-direction: column; gap: 44px; }
  .section { scroll-margin-top: calc(var(--controls-h) + 24px); }
  .sec-head { display: flex; align-items: baseline; gap: 12px; margin: 0 0 4px; }
  .sec-dot { width: 12px; height: 12px; border-radius: 50%; transform: translateY(1px); }
  .sec-name { font-family: "Libre Caslon Display", serif; font-size: 26px; margin: 0; }
  .sec-count { font-size: 12px; color: var(--ink-faint); letter-spacing: .04em; }
  .sec-blurb { color: var(--ink-soft); font-size: 13.5px; margin: 0 0 16px; max-width: 70ch; }

  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(272px, 1fr)); gap: 18px; }

  .card {
    background: var(--stone-card); border: 1px solid var(--line); border-radius: var(--radius);
    padding: 18px; display: flex; flex-direction: column; gap: 11px;
    box-shadow: var(--shadow); transition: border-color .18s, transform .18s, box-shadow .18s;
  }
  .card:hover { transform: translateY(-2px); }
  .card.sel { border-color: var(--claret); box-shadow: 0 0 0 2px color-mix(in srgb, var(--claret) 30%, transparent), var(--shadow); }

  .eyebrow {
    font-size: 10.5px; letter-spacing: .18em; text-transform: uppercase; font-weight: 600;
    display: inline-flex; align-items: center; gap: 7px;
  }
  .eyebrow .dot { width: 8px; height: 8px; border-radius: 50%; }
  .card-title { font-family: "Libre Caslon Display", serif; font-size: 21px; line-height: 1.12; margin: 0; }
  .desc { margin: 0; color: var(--ink-soft); font-size: 13.5px; }

  .tags { display: flex; flex-wrap: wrap; gap: 6px; }
  .tag {
    font-size: 11px; color: var(--ink-soft); background: var(--stone-deep);
    border-radius: 999px; padding: 3px 9px; border: 1px solid var(--line-soft);
  }
  .tag.new { background: color-mix(in srgb, var(--brass) 18%, var(--stone-card)); border-color: var(--brass); color: var(--brass); font-weight: 600; }

  .field { font-size: 12.5px; }
  .field .lbl {
    font-size: 11px; letter-spacing: .14em; text-transform: uppercase;
    color: var(--ink-faint); display: block; margin-bottom: 3px;
  }
  .field .val { color: var(--ink); }
  .why { color: var(--ink); }
  .why .val { font-style: italic; }
  .note {
    font-size: 12px; color: var(--brass); background: color-mix(in srgb, var(--brass) 10%, transparent);
    border-left: 3px solid var(--brass); padding: 6px 10px; border-radius: 0 8px 8px 0;
  }

  /* Card status bar (for agent update result) */
  .card-status { display: flex; align-items: center; gap: 8px; min-height: 20px; }
  .saved { font-size: 11.5px; color: var(--thames); font-weight: 600; }
  .err { font-size: 11.5px; color: var(--claret); }

  .actions { display: flex; gap: 8px; margin-top: 2px; flex-wrap: wrap; }
  .btn {
    cursor: pointer; font: inherit; font-size: 12.5px; font-weight: 600;
    border-radius: 999px; padding: 8px 14px; border: 1px solid transparent;
    display: inline-flex; align-items: center; gap: 7px; transition: background .15s, color .15s, border-color .15s;
  }
  .btn:disabled { cursor: default; opacity: .65; }
  .btn.primary { background: var(--ink); color: var(--stone-card); }
  .btn.primary:hover:not(:disabled) { background: var(--claret); }
  .btn.ghost { background: transparent; color: var(--ink); border-color: var(--line); }
  .btn.ghost:hover:not(:disabled) { border-color: var(--ink-faint); }
  .spinner {
    width: 13px; height: 13px; border-radius: 50%;
    border: 2px solid currentColor; border-right-color: transparent;
    animation: spin .7s linear infinite; flex: 0 0 auto;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .empty-state {
    border: 1px dashed var(--line); border-radius: var(--radius); padding: 40px 24px;
    text-align: center; color: var(--ink-soft); background: var(--stone-card);
  }
  .empty-state h3 { font-family: "Libre Caslon Display", serif; color: var(--ink); margin: 0 0 6px; }

  .footer { border-top: 1px solid var(--line); padding: 26px 0 50px; color: var(--ink-faint); font-size: 12.5px; }
  .footer p { margin: 4px 0; }

  /* Mapbox marker + popup */
  .pin {
    width: 16px; height: 16px; border-radius: 50% 50% 50% 0; transform: rotate(-45deg);
    border: 2px solid var(--stone-card); box-shadow: 0 1px 4px rgba(0,0,0,.35); cursor: pointer;
  }
  .pin:hover { filter: brightness(1.12); }
  .mapboxgl-popup-content {
    font-family: "Inter", sans-serif; border-radius: 10px; padding: 12px 14px;
    box-shadow: 0 8px 24px rgba(0,0,0,.18);
  }
  .pop-eyebrow { font-size: 10px; letter-spacing: .14em; text-transform: uppercase; font-weight: 700; }
  .pop-title { font-family: "Libre Caslon Display", serif; font-size: 17px; margin: 2px 0 4px; color: #211D17; }
  .pop-why { font-size: 12.5px; color: #534D43; max-width: 220px; }

  /* Best time bar */
  .besttime { display: flex; flex-direction: column; gap: 5px; }
  .bt-row { display: flex; align-items: center; gap: 2px; }
  .bt-cell {
    flex: 1; height: 22px; border-radius: 5px;
    display: flex; align-items: center; justify-content: center;
    font-size: 9.5px; font-weight: 700; letter-spacing: .04em; text-transform: uppercase;
    background: var(--stone-deep); color: var(--ink-faint);
    border: 1px solid var(--line-soft);
    transition: background .15s, color .15s, border-color .15s;
    user-select: none; cursor: default;
  }
  .bt-cell.on { color: #fff; border-color: transparent; }
  .bt-note { font-size: 11.5px; color: var(--ink-faint); font-style: italic; line-height: 1.4; }

  /* Photo links */
  .photo-links { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .photo-link {
    display: inline-flex; align-items: center; gap: 5px; font-size: 12px;
    color: var(--ink-soft); text-decoration: none; border: 1px solid var(--line);
    border-radius: 999px; padding: 5px 11px; background: var(--stone-deep);
    transition: border-color .15s, color .15s, background .15s; white-space: nowrap;
  }
  .photo-link:hover { color: var(--claret); border-color: var(--claret); background: color-mix(in srgb, var(--claret) 6%, var(--stone-card)); }
  .photo-link svg { flex: 0 0 auto; }

  /* Theme picker */
  .theme-wrap { position: relative; flex: 0 0 auto; }
  .theme-btn {
    cursor: pointer; background: var(--stone-card); border: 1px solid var(--line);
    border-radius: 999px; height: 36px; padding: 0 13px;
    display: flex; align-items: center; gap: 7px;
    color: var(--ink-soft); font: inherit; font-size: 13px; font-weight: 500;
    transition: border-color .15s, color .15s; white-space: nowrap;
  }
  .theme-btn:hover { border-color: var(--ink-faint); color: var(--ink); }
  .theme-panel {
    position: absolute; right: 0; top: calc(100% + 8px); z-index: 200;
    background: var(--stone-card); border: 1px solid var(--line);
    border-radius: var(--radius); box-shadow: 0 12px 40px rgba(33,29,23,.16);
    padding: 10px; width: 252px; display: flex; flex-direction: column; gap: 2px;
  }
  .theme-panel-title {
    font-size: 10px; letter-spacing: .22em; text-transform: uppercase;
    color: var(--ink-faint); margin: 0 6px 6px; font-weight: 600;
  }
  .theme-option {
    display: flex; align-items: center; gap: 10px; padding: 9px 10px;
    border-radius: 9px; cursor: pointer; border: 1.5px solid transparent;
    transition: background .12s, border-color .12s; background: none;
    width: 100%; font: inherit; color: var(--ink); text-align: left;
  }
  .theme-option:hover { background: var(--stone-deep); }
  .theme-option.thm-active { border-color: var(--claret); background: color-mix(in srgb, var(--claret) 8%, var(--stone-card)); }
  .thm-swatches { display: flex; gap: 4px; flex: 0 0 auto; }
  .thm-swatch { width: 15px; height: 15px; border-radius: 50%; border: 1.5px solid rgba(0,0,0,.12); flex: 0 0 auto; }
  .thm-info { display: flex; flex-direction: column; gap: 1px; }
  .thm-name { font-size: 13px; font-weight: 600; line-height: 1.2; }
  .thm-desc { font-size: 11px; color: var(--ink-faint); }

  /* Settings modal */
  .settings-overlay {
    position: fixed; inset: 0; z-index: 500;
    background: rgba(33,29,23,.45); backdrop-filter: blur(3px);
    display: flex; align-items: center; justify-content: center; padding: 20px;
  }
  .settings-modal {
    background: var(--stone-card); border: 1px solid var(--line);
    border-radius: calc(var(--radius) + 4px); box-shadow: 0 24px 64px rgba(33,29,23,.24);
    width: 100%; max-width: 500px; display: flex; flex-direction: column; gap: 0;
    max-height: calc(100vh - 40px); overflow-y: auto;
  }
  .settings-head {
    display: flex; align-items: center; justify-content: space-between;
    padding: 20px 22px 16px; border-bottom: 1px solid var(--line);
    position: sticky; top: 0; background: var(--stone-card); z-index: 1;
  }
  .settings-title { font-family: "Libre Caslon Display", serif; font-size: 22px; margin: 0; }
  .settings-close {
    cursor: pointer; background: var(--stone-deep); border: 1px solid var(--line);
    border-radius: 50%; width: 32px; height: 32px;
    display: flex; align-items: center; justify-content: center;
    color: var(--ink-soft); font: inherit; font-size: 18px;
    transition: background .15s, color .15s;
  }
  .settings-close:hover { background: var(--line); color: var(--ink); }
  .settings-section {
    padding: 20px 22px; display: flex; flex-direction: column; gap: 10px;
    border-bottom: 1px solid var(--line-soft);
  }
  .settings-section:last-of-type { border-bottom: 0; }
  .settings-label {
    font-size: 11px; letter-spacing: .18em; text-transform: uppercase;
    font-weight: 700; color: var(--ink-faint);
  }
  .settings-hint { font-size: 13px; color: var(--ink-soft); margin: 0; line-height: 1.5; }
  .settings-field {
    display: flex; gap: 6px; align-items: center;
  }
  .settings-field input {
    flex: 1; border: 1px solid var(--line); border-radius: 10px; padding: 9px 12px;
    font: inherit; font-size: 13px; background: var(--stone); color: var(--ink); min-width: 0;
    font-family: monospace;
  }
  .settings-field input:focus { outline: 2px solid var(--focus); outline-offset: 1px; }
  .settings-toggle {
    cursor: pointer; background: var(--stone-deep); border: 1px solid var(--line);
    border-radius: 8px; padding: 8px 10px; font: inherit; font-size: 12px;
    color: var(--ink-soft); white-space: nowrap;
    transition: border-color .15s;
  }
  .settings-toggle:hover { border-color: var(--ink-faint); }
  .settings-row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .settings-saved { font-size: 12px; color: var(--thames); font-weight: 600; display: flex; align-items: center; gap: 5px; }
  .settings-foot {
    padding: 14px 22px 20px; font-size: 11.5px; color: var(--ink-faint); line-height: 1.5;
  }
  .gear-btn {
    cursor: pointer; background: var(--stone-card); border: 1px solid var(--line);
    border-radius: 50%; width: 36px; height: 36px; flex: 0 0 auto;
    display: flex; align-items: center; justify-content: center;
    color: var(--ink-soft); transition: border-color .15s, color .15s;
  }
  .gear-btn:hover { border-color: var(--ink-faint); color: var(--ink); }

  @media (prefers-reduced-motion: reduce) {
    * { animation-duration: .001ms !important; transition: none !important; }
  }

</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">

const { useState, useMemo, useEffect, useRef, useCallback } = React;

/* ------------------------------------------------------------------ *
 * Add your Mapbox public token here to make the live map appear on
 * load. You can also enter it in Settings (gear icon) at any time.
 * ------------------------------------------------------------------ */
const MAPBOX_TOKEN = "";

/* ------------------------------------------------------------------ *
 * Client-side persistence via namespaced localStorage keys.
 * All reads/writes are try-catched so restricted storage never breaks the app.
 * ------------------------------------------------------------------ */
const LS_TOKEN        = "lfg:mapbox_token";
const LS_THEME        = "lfg:theme_id";
const LS_ANTHROPIC    = "lfg:anthropic_key";

function lsGet(key) { try { return localStorage.getItem(key) || null; } catch (_) { return null; } }
function lsSet(key, value) { try { localStorage.setItem(key, value); return true; } catch (_) { return false; } }
function lsDel(key) { try { localStorage.removeItem(key); } catch (_) {} }

/* ------------------------------------------------------------------ *
 * Themes - each defines a full set of CSS custom properties.
 * Apply a theme by calling applyTheme(themeId).
 * ------------------------------------------------------------------ */
const THEMES = [
  {
    id: "portland", name: "Portland Stone", desc: "Classic warm parchment",
    palette: ["#ECE6DA","#7C2A33","#8C6E2B"],
    mapStyle: "mapbox://styles/mapbox/light-v11",
    vars: { "--stone":"#ECE6DA","--stone-card":"#F6F2E9","--stone-deep":"#E1D9C8",
      "--ink":"#211D17","--ink-soft":"#534D43","--ink-faint":"#8A8273",
      "--line":"#D5CCBA","--line-soft":"#E3DBCB",
      "--claret":"#7C2A33","--claret-deep":"#5E1E26","--brass":"#8C6E2B","--thames":"#2C5862" },

/* ------------------------------------------------------------------ *
 * Theme picker
 * ------------------------------------------------------------------ */
function ThemePicker({ currentTheme, onTheme }) {
  const [open, setOpen] = React.useState(false);
  const wrapRef = useRef(null);
  useEffect(() => {
    if (!open) return;
    const onKey = e => { if (e.key === "Escape") setOpen(false); };
    const onDown = e => { if (wrapRef.current && !wrapRef.current.contains(e.target)) setOpen(false); };
    document.addEventListener("keydown", onKey);
    document.addEventListener("mousedown", onDown);
    return () => { document.removeEventListener("keydown", onKey); document.removeEventListener("mousedown", onDown); };
  }, [open]);
  const active = THEMES.find(t => t.id === currentTheme) || THEMES[0];
  return (
    <div className="theme-wrap" ref={wrapRef}>
      <button className="theme-btn" onClick={() => setOpen(v => !v)} aria-label="Choose theme" aria-expanded={open}>
        <PaletteIcon />{active.name}
      </button>
      {open && (
        <div className="theme-panel" role="listbox" aria-label="Theme options">
          <p className="theme-panel-title">Choose a theme</p>
          {THEMES.map(t => (
            <button key={t.id}
              className={"theme-option" + (t.id === currentTheme ? " thm-active" : "")}
              role="option" aria-selected={t.id === currentTheme}
              onClick={() => { onTheme(t.id); setOpen(false); }}>
              <div className="thm-swatches">
                {t.palette.map((c, i) => <span key={i} className="thm-swatch" style={{ background: c }} />)}
              </div>
              <div className="thm-info">
                <span className="thm-name">{t.name}</span>
                <span className="thm-desc">{t.desc}</span>
              </div>
            </button>
          ))}
        </div>
      )}
    </div>
  );
}

/* ------------------------------------------------------------------ *
 * Settings modal (Mapbox token + Anthropic API key)
 * ------------------------------------------------------------------ */
function SettingsModal({ open, onClose, token, onToken, onForgetToken, tokenSaved,
                         anthropicKey, onAnthropicKey, onForgetAnthropicKey, anthropicSaved }) {
  const [showToken,  setShowToken]  = useState(false);
  const [showKey,    setShowKey]    = useState(false);
  const [draftToken, setDraftToken] = useState("");
  const [draftKey,   setDraftKey]   = useState("");

  useEffect(() => {
    if (open) { setDraftToken(token || ""); setDraftKey(anthropicKey || ""); }
  }, [open, token, anthropicKey]);

  useEffect(() => {
    if (!open) return;
    const h = e => { if (e.key === "Escape") onClose(); };
    document.addEventListener("keydown", h);
    return () => document.removeEventListener("keydown", h);
  }, [open, onClose]);

  if (!open) return null;

  const saveToken = () => { if (draftToken.trim()) onToken(draftToken.trim()); };
  const saveKey   = () => { if (draftKey.trim())   onAnthropicKey(draftKey.trim()); };

  return (
    <div className="settings-overlay" onClick={e => { if (e.target === e.currentTarget) onClose(); }}>
      <div className="settings-modal" role="dialog" aria-modal="true" aria-labelledby="settings-title">
        <div className="settings-head">
          <h2 className="settings-title" id="settings-title">Settings</h2>
          <button className="settings-close" onClick={onClose} aria-label="Close settings">&#x2715;</button>
        </div>

        <div className="settings-section">
          <span className="settings-label">Mapbox token</span>
          <p className="settings-hint">Enables the live map. Get a free public token at <a href="https://mapbox.com" target="_blank" rel="noopener noreferrer">mapbox.com</a>. Starts with pk.</p>
          <div className="settings-field">
            <input type={showToken ? "text" : "password"} value={draftToken}
              onChange={e => setDraftToken(e.target.value)} placeholder="pk.your_token_here"
              onKeyDown={e => { if (e.key === "Enter") saveToken(); }} />
            <button className="settings-toggle" onClick={() => setShowToken(v => !v)}>{showToken ? "Hide" : "Show"}</button>
          </div>
          <div className="settings-row">
            <button className="btn primary" disabled={!isTokenValid(draftToken)} onClick={saveToken}>Save and apply</button>
            <button className="btn ghost" onClick={() => { onForgetToken(); setDraftToken(""); }}>Forget</button>
            {tokenSaved && <span className="settings-saved"><CheckIcon /> Saved in browser</span>}
          </div>
        </div>

        <div className="settings-section">
          <span className="settings-label">Anthropic API key</span>
          <p className="settings-hint">Required for "Update all with agent" when using this file outside Claude.ai. Starts with sk-ant-.</p>
          <div className="settings-field">
            <input type={showKey ? "text" : "password"} value={draftKey}
              onChange={e => setDraftKey(e.target.value)} placeholder="sk-ant-api03-..."
              onKeyDown={e => { if (e.key === "Enter") saveKey(); }} />
            <button className="settings-toggle" onClick={() => setShowKey(v => !v)}>{showKey ? "Hide" : "Show"}</button>
          </div>
          <div className="settings-row">
            <button className="btn primary" disabled={!isApiKeyValid(draftKey)} onClick={saveKey}>Save</button>
            <button className="btn ghost" onClick={() => { onForgetAnthropicKey(); setDraftKey(""); }}>Forget</button>
            {anthropicSaved && <span className="settings-saved"><CheckIcon /> Saved in browser</span>}
          </div>
        </div>

        <p className="settings-foot">
          Both values are stored only in this browser via localStorage under namespaced keys.
          They are never sent to any server other than Mapbox and Anthropic directly when you use the respective features.
        </p>
      </div>
    </div>
  );
}

/* ------------------------------------------------------------------ *
 * Map panel — with live location tracking
 * ------------------------------------------------------------------ */
function MapPanel({ items, selectedId, onSelect, token, onToken, onForgetToken, tokenSaved, mapStyle }) {
  const containerRef  = useRef(null);
  const mapRef        = useRef(null);
  const markersRef    = useRef({});
  const openPopupRef  = useRef(null);
  const locMarkerRef  = useRef(null);
  const watchIdRef    = useRef(null);
  const prevStyleRef  = useRef(null);
  const [draftToken,  setDraftToken]  = useState("");
  const [ready,       setReady]       = useState(false);
  const [locTracking, setLocTracking] = useState(false);
  const [locError,    setLocError]    = useState(null);
  const [locPos,      setLocPos]      = useState(null);
  const hasFlewToLoc  = useRef(false);

  // Create map once a valid token is present.
  useEffect(() => {
    if (!isTokenValid(token) || !containerRef.current || mapRef.current) return;
    mapboxgl.accessToken = token.trim();
    const map = new mapboxgl.Map({
      container: containerRef.current, style: mapStyle,
      center: [-0.118, 51.509], zoom: 10.2, attributionControl: true,
    });
    map.addControl(new mapboxgl.NavigationControl({ showCompass: false }), "top-right");
    map.on("load", () => { prevStyleRef.current = mapStyle; setReady(true); });
    mapRef.current = map;
    return () => {
      map.remove(); mapRef.current = null; setReady(false); prevStyleRef.current = null;
    };
  }, [token]);

  // Switch style when theme changes.
  useEffect(() => {
    const map = mapRef.current;
    if (!map || prevStyleRef.current === null) return;
    if (prevStyleRef.current === mapStyle) return;
    prevStyleRef.current = mapStyle;
    setReady(false);
    map.setStyle(mapStyle);
    map.once("style.load", () => setReady(true));
  }, [mapStyle]);

  // Rebuild place markers whenever visible list or ready state changes.
  useEffect(() => {
    const map = mapRef.current;
    if (!map || !ready) return;
    Object.values(markersRef.current).forEach(m => m.remove());
    markersRef.current = {};
    items.forEach(loc => {
      const colour = CAT[loc.cat].color;
      const el = document.createElement("div");
      el.className = "pin"; el.style.background = colour;
      el.setAttribute("role", "button"); el.setAttribute("aria-label", loc.name);
      el.addEventListener("click", () => onSelect(loc.id));
      const popup = new mapboxgl.Popup({ offset: 16, closeButton: false }).setHTML(
        '<div class="pop-eyebrow" style="color:' + colour + '">' + CAT[loc.cat].name + '</div>' +
        '<div class="pop-title">' + loc.name + '</div>' +
        '<div class="pop-why">' + loc.why + '</div>'
      );
      const marker = new mapboxgl.Marker({ element: el }).setLngLat([loc.lng, loc.lat]).setPopup(popup).addTo(map);
      markersRef.current[loc.id] = marker;
    });
  }, [items, ready, onSelect]);

  // Fly to selected place.
  useEffect(() => {
    const map = mapRef.current;
    if (!map || !ready || !selectedId) return;
    const loc = items.find(i => i.id === selectedId);
    const marker = markersRef.current[selectedId];
    if (!loc || !marker) return;
    if (openPopupRef.current && openPopupRef.current.isOpen()) openPopupRef.current.remove();
    const target = { center: [loc.lng, loc.lat], zoom: Math.max(map.getZoom(), 13) };
    prefersReducedMotion() ? map.jumpTo(target) : map.flyTo({ ...target, speed: 1.1, essential: true });
    const popup = marker.getPopup();
    if (popup && !popup.isOpen()) marker.togglePopup();
    openPopupRef.current = popup;
  }, [selectedId, ready, items]);

  // Update or create the location marker whenever position changes.
  useEffect(() => {
    const map = mapRef.current;
    if (!map || !ready || !locPos) return;
    const { lat, lng } = locPos;
    if (!locMarkerRef.current) {
      const el = document.createElement("div");
      el.className = "loc-marker";
      el.innerHTML = '<div class="loc-pulse"></div><div class="loc-core"></div>';
      locMarkerRef.current = new mapboxgl.Marker({ element: el, anchor: "center" })
        .setLngLat([lng, lat]).addTo(map);
    } else {
      locMarkerRef.current.setLngLat([lng, lat]);
    }
    // Fly to user on first fix only.
    if (!hasFlewToLoc.current) {
      hasFlewToLoc.current = true;
      prefersReducedMotion()
        ? map.jumpTo({ center: [lng, lat], zoom: 13 })
        : map.flyTo({ center: [lng, lat], zoom: 13, speed: 1.2, essential: true });
    }
  }, [locPos, ready]);

  // Clean up location marker when tracking stops.
  useEffect(() => {
    if (!locTracking && locMarkerRef.current) {
      locMarkerRef.current.remove();
      locMarkerRef.current = null;
      hasFlewToLoc.current = false;
    }
  }, [locTracking]);

  // Clean up watchPosition on unmount.
  useEffect(() => () => {
    if (watchIdRef.current !== null) navigator.geolocation.clearWatch(watchIdRef.current);
    if (locMarkerRef.current) { locMarkerRef.current.remove(); locMarkerRef.current = null; }
  }, []);

  const toggleLocation = useCallback(() => {
    if (locTracking) {
      if (watchIdRef.current !== null) { navigator.geolocation.clearWatch(watchIdRef.current); watchIdRef.current = null; }
      setLocTracking(false); setLocPos(null); setLocError(null);
    } else {
      if (!navigator.geolocation) { setLocError("Your browser does not support location."); return; }
      setLocError(null);
      navigator.geolocation.getCurrentPosition(
        pos => {
          setLocPos({ lat: pos.coords.latitude, lng: pos.coords.longitude });
          setLocTracking(true);
          watchIdRef.current = navigator.geolocation.watchPosition(
            p => setLocPos({ lat: p.coords.latitude, lng: p.coords.longitude }),
            e => { setLocError("Location unavailable."); setLocTracking(false); },
            { enableHighAccuracy: true, timeout: 15000, maximumAge: 5000 }
          );
        },
        err => {
          const msgs = { 1:"Location access was denied.", 2:"Location could not be determined.", 3:"Location request timed out." };
          setLocError(msgs[err.code] || "Location unavailable.");
        },
        { enableHighAccuracy: true, timeout: 10000 }
      );
    }
  }, [locTracking]);

  if (!isTokenValid(token)) {
    return (
      <div className="mapcard">
        <div className="map-empty">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="var(--ink-faint)" strokeWidth="1.4" strokeLinejoin="round">
            <path d="M9 3 3 5v16l6-2 6 2 6-2V3l-6 2-6-2Z"/><path d="M9 3v16"/><path d="M15 5v16"/>
          </svg>
          <h3>See every place on a live map</h3>
          <p>Enter your Mapbox public token in Settings (gear icon) or paste it below. The full guide works without it.</p>
          <div className="token-field">
            <label className="visually-hidden" htmlFor="tok">Mapbox public token</label>
            <input id="tok" type="text" placeholder="pk.your_token_here" value={draftToken}
              onChange={e => setDraftToken(e.target.value)}
              onKeyDown={e => { if (e.key === "Enter" && isTokenValid(draftToken)) onToken(draftToken.trim()); }} />
            <button className="btn primary" disabled={!isTokenValid(draftToken)} onClick={() => onToken(draftToken.trim())}>
              Save and show map
            </button>
          </div>
          <p style={{ fontSize:"11.5px", color:"var(--ink-faint)", marginTop:4 }}>
            Your token is stored only in this browser and sent nowhere except Mapbox.
          </p>
        </div>
      </div>
    );
  }

  return (
    <div className="mapcard">
      <div ref={containerRef} className="map" />
      <div className="map-foot">
        {CATEGORIES.map(c => (
          <span className="legend-item" key={c.key}>
            <span className="dot" style={{ background: c.color }} />{c.name}
          </span>
        ))}
        {locError && <span className="loc-err">{locError}</span>}
        <button
          className={"loc-btn" + (locTracking ? " loc-active" : "")}
          onClick={toggleLocation}
          title={locTracking ? "Stop tracking my location" : "Show my location on the map"}
        >
          <LocationIcon active={locTracking} />
          {locTracking ? "Tracking" : "My location"}
        </button>
        {tokenSaved && (
          <span style={{ display:"flex", alignItems:"center", gap:5, fontSize:"11px", color:"var(--ink-faint)" }}>
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="var(--thames)" strokeWidth="2.5" strokeLinecap="round"><polyline points="20 6 9 17 4 12"/></svg>
            Token saved
            <button style={{ background:"none",border:0,color:"var(--ink-faint)",cursor:"pointer",font:"inherit",fontSize:"11px",textDecoration:"underline",textUnderlineOffset:"2px",padding:0 }}
              onClick={onForgetToken} title="Remove saved token">Forget</button>
          </span>
        )}
      </div>
    </div>
  );
}

/* ------------------------------------------------------------------ *
 * Card — per-place card; shows update status but no per-card update button.
 * ------------------------------------------------------------------ */
function Card({ loc, selected, onSelect, status }) {
  const cat = CAT[loc.cat];
  const photoUrl   = "https://www.google.com/search?q=" + encodeURIComponent(loc.name + " London") + "&tbm=isch";
  const unsplashUrl = "https://unsplash.com/s/photos/" + encodeURIComponent(loc.name.toLowerCase().replace(/\s+/g, "-") + "-london");
  return (
    <article className={"card" + (selected ? " sel" : "")} id={"card-" + loc.id}>
      <span className="eyebrow" style={{ color: cat.color }}>
        <span className="dot" style={{ background: cat.color }} />{cat.name}
      </span>
      <h3 className="card-title">{loc.name}</h3>
      <p className="desc">{loc.desc}</p>

      <div className="tags">
        {loc.features.map(f => (
          <span className={"tag" + (f === "Newly opened" ? " new" : "")} key={f}>{f}</span>
        ))}
      </div>

      <BestTimeBar id={loc.id} color={cat.color} />

      <div className="field">
        <span className="lbl">Close by</span>
        <span className="val">{loc.near.join(", ")}</span>
      </div>
      <div className="field why">
        <span className="lbl">Why see it</span>
        <span className="val">{loc.why}</span>
      </div>

      {loc.note ? <div className="note">{loc.note}</div> : null}

      <div className="photo-links">
        <a className="photo-link" href={photoUrl} target="_blank" rel="noopener noreferrer">
          <CameraIcon /> Google Photos <ExternalLinkIcon />
        </a>
        <a className="photo-link" href={unsplashUrl} target="_blank" rel="noopener noreferrer">
          <CameraIcon /> Unsplash <ExternalLinkIcon />
        </a>
      </div>

      <div className="card-status">
        {status === "loading" && <><span className="spinner" /><span style={{fontSize:"12px",color:"var(--ink-soft)"}}>Updating...</span></>}
        {status === "done"    && <span className="saved"><CheckIcon /> Updated just now</span>}
        {status === "error"   && <span className="err">Could not reach the agent. Please try again.</span>}
      </div>

      <div className="actions">
        <button className="btn primary" onClick={() => onSelect(loc.id)}>
          <PinIcon /> Show on map
        </button>
      </div>
    </article>
  );
}

/* ------------------------------------------------------------------ *
 * App
 * ------------------------------------------------------------------ */
function App() {
  const [data,            setData]           = useState(RAW);
  const [query,           setQuery]          = useState("");
  const [cat,             setCat]            = useState("all");
  const [feats,           setFeats]          = useState([]);
  const [showAllFeats,    setShowAllFeats]   = useState(false);
  const [selectedId,      setSelectedId]     = useState(null);
  const [token,           setToken]          = useState(() => lsGet(LS_TOKEN) || MAPBOX_TOKEN);
  const [tokenSaved,      setTokenSaved]     = useState(() => !!lsGet(LS_TOKEN));
  const [anthropicKey,    setAnthropicKey]   = useState(() => lsGet(LS_ANTHROPIC) || "");
  const [anthropicSaved,  setAnthropicSaved] = useState(() => !!lsGet(LS_ANTHROPIC));
  const [themeId,         setThemeId]        = useState(() => {
    const s = lsGet(LS_THEME);
    return s && THEMES.find(t => t.id === s) ? s : DEFAULT_THEME.id;
  });
  const [settingsOpen,    setSettingsOpen]   = useState(false);
  const [status,          setStatus]         = useState({});
  const [updatingAll,     setUpdatingAll]    = useState(false);
  const [updateProgress,  setUpdateProgress] = useState(0);
  const [updateTotal,     setUpdateTotal]    = useState(0);
  const cancelRef  = useRef(false);
  const controlsRef = useRef(null);

  // Track controls bar height and keep --controls-h in sync.
  useEffect(() => {
    const el = controlsRef.current;
    if (!el) return;
    const apply = () =>
      document.documentElement.style.setProperty("--controls-h", el.offsetHeight + "px");
    apply();
    const ro = new ResizeObserver(apply);
    ro.observe(el);
    return () => ro.disconnect();
  }, []);

  // Apply theme CSS variables.
  useEffect(() => {
    const t = THEMES.find(x => x.id === themeId) || DEFAULT_THEME;
    applyTheme(t);
  }, [themeId]);

  const activeTheme = THEMES.find(x => x.id === themeId) || DEFAULT_THEME;

  /* --- persistence handlers --- */
  const handleTheme        = useCallback(id => { setThemeId(id); lsSet(LS_THEME, id); }, []);
  const handleToken        = useCallback(t  => { setToken(t); setTokenSaved(lsSet(LS_TOKEN, t)); }, []);
  const handleForgetToken  = useCallback(() => { lsDel(LS_TOKEN); setToken(MAPBOX_TOKEN); setTokenSaved(false); }, []);
  const handleAnthropicKey = useCallback(k  => { setAnthropicKey(k); setAnthropicSaved(lsSet(LS_ANTHROPIC, k)); }, []);
  const handleForgetApiKey = useCallback(() => { lsDel(LS_ANTHROPIC); setAnthropicKey(""); setAnthropicSaved(false); }, []);

  /* --- filters --- */
  const toggleFeat = useCallback(f =>
    setFeats(prev => prev.includes(f) ? prev.filter(x => x !== f) : [...prev, f]), []);
  const clearAll   = useCallback(() => { setQuery(""); setCat("all"); setFeats([]); }, []);

  const filtered = useMemo(() => {
    const q = query.trim().toLowerCase();
    return data.filter(p => {
      if (cat !== "all" && p.cat !== cat) return false;
      if (feats.length && !feats.every(f => p.features.includes(f))) return false;
      if (q) {
        const hay = (p.name+" "+p.desc+" "+p.why+" "+CAT[p.cat].name+" "+
          p.features.join(" ")+" "+p.near.join(" ")).toLowerCase();
        if (!hay.includes(q)) return false;
      }
      return true;
    });
  }, [data, query, cat, feats]);

  const grouped = useMemo(() =>
    CATEGORIES.map(c => ({ cat: c, items: filtered.filter(p => p.cat === c.key) }))
      .filter(g => g.items.length), [filtered]);

  const onSelect = useCallback(id => {
    setSelectedId(id);
    const el = document.getElementById("card-" + id);
    if (el) el.scrollIntoView({ behavior: prefersReducedMotion() ? "auto" : "smooth", block: "center" });
  }, []);

  /* --- agent update for a single place --- */
  const buildPrompt = loc =>
    "You are a London travel editor. Reply with strict minified JSON only, no markdown and no extra words. " +
    "Use British English, simple clear language for non-native English speakers, never use emojis or em-dashes. " +
    'Give fresh visitor details for this London place: "' + loc.name + '". ' +
    "Return a JSON object with keys: description (two short sentences), features (array of 3-5 short tags), " +
    "why (one sentence on why to visit), note (one short sentence with any timely 2026 detail, or empty string). " +
    "Keep all facts accurate as of 2026.";

  const callAgent = useCallback(async loc => {
    const headers = { "Content-Type": "application/json" };
    if (anthropicKey) headers["x-api-key"] = anthropicKey;
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST", headers,
      body: JSON.stringify({ model:"claude-sonnet-4-6", max_tokens:1000,
        messages:[{ role:"user", content: buildPrompt(loc) }] }),
    });
    const json = await res.json();
    const text = (json.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("");
    return JSON.parse(text.replace(/```json|```/g,"").trim());
  }, [anthropicKey]);

  const applyUpdate = useCallback((locId, u) => {
    setData(prev => prev.map(p => p.id !== locId ? p : {
      ...p,
      desc:     typeof u.description==="string" && u.description ? u.description : p.desc,
      features: Array.isArray(u.features) && u.features.length   ? u.features    : p.features,
      why:      typeof u.why==="string"    && u.why              ? u.why          : p.why,
      note:     typeof u.note==="string"                         ? u.note         : (p.note||""),
    }));
  }, []);

  /* --- update ALL visible places sequentially --- */
  const onUpdateAll = useCallback(async () => {
    if (updatingAll) return;
    const places = [...filtered];
    setUpdatingAll(true);
    setUpdateProgress(0);
    setUpdateTotal(places.length);
    cancelRef.current = false;

    for (let i = 0; i < places.length; i++) {
      if (cancelRef.current) break;
      const loc = places[i];
      setStatus(s => ({ ...s, [loc.id]: "loading" }));
      try {
        const u = await callAgent(loc);
        applyUpdate(loc.id, u);
        setStatus(s => ({ ...s, [loc.id]: "done" }));
        setTimeout(() => setStatus(s => ({ ...s, [loc.id]: "idle" })), 5000);
      } catch(_) {
        setStatus(s => ({ ...s, [loc.id]: "error" }));
        setTimeout(() => setStatus(s => ({ ...s, [loc.id]: "idle" })), 5000);
      }
      setUpdateProgress(i + 1);
      if (i < places.length - 1 && !cancelRef.current) await sleep(350);
    }
    setUpdatingAll(false);
  }, [filtered, updatingAll, callAgent, applyUpdate]);

  const cancelUpdateAll = useCallback(() => { cancelRef.current = true; setUpdatingAll(false); }, []);

  const featuresToShow = showAllFeats ? ALL_FEATURES : ALL_FEATURES.slice(0, 10);
  const hasFilters = query || cat !== "all" || feats.length;

  return (
    <React.Fragment>
      <SettingsModal
        open={settingsOpen} onClose={() => setSettingsOpen(false)}
        token={token} onToken={handleToken} onForgetToken={handleForgetToken} tokenSaved={tokenSaved}
        anthropicKey={anthropicKey} onAnthropicKey={handleAnthropicKey}
        onForgetAnthropicKey={handleForgetApiKey} anthropicSaved={anthropicSaved}
      />

      <header className="masthead wrap">
        <p className="kicker">A visitor's field guide</p>
        <h1 className="nameplate">London</h1>
        <div className="double-rule" />
        <p className="sub">Every place worth seeing, grouped by what it is. Search, filter, and find it on the map.</p>
        <p className="dateline">Updated June 2026</p>
      </header>

      <div className="controls" ref={controlsRef}>
        <div className="wrap controls-inner">
          <div className="search-row">
            <div className="search">
              <SearchIcon />
              <label className="visually-hidden" htmlFor="q">Search places</label>
              <input id="q" type="text" placeholder="Search by name, area or feature"
                value={query} onChange={e => setQuery(e.target.value)} />
            </div>
            <span className="count">{filtered.length} of {data.length} places</span>
            {hasFilters ? <button className="linkbtn" onClick={clearAll}>Clear</button> : null}

            <div className="search-tools">
              {updatingAll ? (
                <span className="update-progress">
                  <span className="spinner" />
                  <span><span className="update-count">{updateProgress}</span> of {updateTotal}</span>
                  <button className="linkbtn" onClick={cancelUpdateAll}>Cancel</button>
                </span>
              ) : (
                <button className="btn ghost" onClick={onUpdateAll} disabled={!filtered.length} title="Fetch fresh details for all visible places via the agent">
                  <RefreshIcon /> Update all {filtered.length > 0 ? filtered.length : ""}
                </button>
              )}
              <ThemePicker currentTheme={themeId} onTheme={handleTheme} />
              <button className="gear-btn" onClick={() => setSettingsOpen(true)} aria-label="Open settings">
                <GearIcon />
              </button>
            </div>
          </div>

          <div className="chiprow">
            <button className={"chip" + (cat === "all" ? " active" : "")} onClick={() => setCat("all")}>All categories</button>
            {CATEGORIES.map(c => (
              <button key={c.key} className={"chip" + (cat === c.key ? " active" : "")}
                onClick={() => setCat(cat === c.key ? "all" : c.key)}>
                <span className="dot" style={{ background: c.color }} />{c.name}
              </button>
            ))}
          </div>

          <div className="filters-label">Filter by feature</div>
          <div className="chiprow wrapped">
            {featuresToShow.map(f => (
              <button key={f} className={"chip feat" + (feats.includes(f) ? " active" : "")} onClick={() => toggleFeat(f)}>{f}</button>
            ))}
            {ALL_FEATURES.length > 10 && (
              <button className="chip" onClick={() => setShowAllFeats(v => !v)}>
                {showAllFeats ? "Fewer filters" : "More filters"}
              </button>
            )}
          </div>
        </div>
      </div>

      <main className="wrap layout">
        <div className="col-list">
          {grouped.length === 0 ? (
            <div className="empty-state">
              <h3>No places match your filters</h3>
              <p>Try removing a feature or choosing a different category.</p>
              <p style={{ marginTop:12 }}><button className="btn primary" onClick={clearAll}>Clear filters</button></p>
            </div>
          ) : grouped.map(g => (
            <section className="section" key={g.cat.key}>
              <div className="sec-head">
                <span className="sec-dot" style={{ background: g.cat.color }} />
                <h2 className="sec-name">{g.cat.name}</h2>
                <span className="sec-count">{g.items.length} {g.items.length === 1 ? "place" : "places"}</span>
              </div>
              <p className="sec-blurb">{g.cat.blurb}</p>
              <div className="grid">
                {g.items.map(loc => (
                  <Card key={loc.id} loc={loc} selected={selectedId === loc.id}
                    onSelect={onSelect} status={status[loc.id] || "idle"} />
                ))}
              </div>
            </section>
          ))}
        </div>

        <aside className="col-map">
          <MapPanel items={filtered} selectedId={selectedId} onSelect={setSelectedId}
            token={token} onToken={handleToken} onForgetToken={handleForgetToken}
            tokenSaved={tokenSaved} mapStyle={activeTheme.mapStyle} />
        </aside>
      </main>

      <footer className="footer">
        <div className="wrap">
          <p>London, A Visitor's Field Guide. Built by Hamid. Details current as of June 2026. Opening times and prices can change, so it is wise to check ahead before you set out.</p>
          <p>Map powered by Mapbox. Use the gear icon to manage your tokens. Update all uses the Claude API to refresh every visible place's details on demand.</p>
        </div>
      </footer>
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

</script>
</body>
</html>
